[optimization]
# Optimization goal: "voltage-range" or "sensitivity-uniformity"
goal = sensitivity-uniformity

# Genetic algorithm parameters
generations = 100
pop_size = 24
elite_count = 2
crossover_rate = 0.8
mutation_rate = 0.01
tournament_size = 3

[initial_conditions]
init_high_fraction = 0.5
seed = 7

[conductivity]
low_cond = 1e-6
high_cond = 1e6

[mesh]
h0 = 0.1

[sensitivity]
# Leave blank to auto-estimate from baseline, or set to a fixed value
sens_norm_scale = 
