[optimization]
generations = 50
pop_size = 24
elite_count = 2
crossover_rate = 0.8
mutation_rate = 0.01
tournament_size = 3

optimizer = de #options: de, ga
de_maxiter = 25
de_popsize = 6
de_mutation_min = 0.5
de_mutation_max = 1.0
de_recombination = 0.7

[initial_conditions]
init_high_fraction = 0.5
seed = 7

[conductivity]
low_cond = 500
high_cond = 1000

[mesh]
h0 = 0.1

[field_shape]
model = fractal #options: rbf, fractal
rbf_rows = 4
rbf_cols = 5
rbf_sigma_frac = 0.90
rbf_bias_init = 0.25
rbf_weight_scale = 0.35
fractal_iter_max = 50
fractal_type = branching #options: julia, mandelbrot, burning_ship, multibrot, branching
fractal_power = 3 #used when fractal_type = multibrot
fractal_shift_frac = 1
fractal_threshold_init = 0.00
fractal_center_origin = true
branching_depth_max = 5
branching_angle_frac = 0.34
branching_length_decay = 0.68
branching_width_frac = 0.12
branching_width_decay = 0.80
branching_mirror_vertical = true
branching_aim_electrodes = true
branching_target_blend = 0.55
branching_root_x_frac = 0.18
branching_root_y_frac = 0.0
branching_seed_all_electrodes = true
branching_force_meet_center = false
branching_meet_x_frac = 0.0
branching_meet_y_frac = 0.0
branching_meet_blend = 0.75
branching_force_touch_all_electrodes = true
electrode_support_k = 4

[visualization]
live_enabled = true
live_backend = vispy
live_update_every = 2

